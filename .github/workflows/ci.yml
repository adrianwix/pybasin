name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra jax-cpu --extra tsfresh --extra nolds --extra interactive --extra torchode --all-groups

      - name: Ruff lint
        run: uv run ruff check --output-format=concise

      - name: Ruff format
        run: uv run ruff format --check

      - name: Pyright
        run: uv run pyright

      - name: Pyright (plotters)
        run: uv run pyright -p src/pybasin/plotters/pyrightconfig.json

      - name: Pyright (benchmarks)
        run: uv run pyright -p benchmarks/pyrightconfig.json

      - name: Pytest (unit tests)
        run: uv run pytest tests/unit --log-level=WARNING
